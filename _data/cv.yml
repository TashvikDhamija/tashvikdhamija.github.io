cv:
  summary: >
    Master's student in Artificial Intelligence and Innovation at Carnegie Mellon University,
    and ML Intern at AWS Annapurna Labs working on generative model training frameworks for AWS Trainium.
    Interests span LLMs, diffusion and flow-matching models, computer vision, and scalable ML systems,
    with a focus on bridging research and engineering. Previously co-founded Verbalia at Inria Startup Studio
    (France) and worked as a Computer Vision Engineer at SwitchOn. Published in IJCV, IEEE T-BIOM,
    and other venues; runner-up in Amazon ML Challenge 2023.

