    Experience:
      - company: Amazon AWS Annapurna Labs
        position: ML Intern — Neuron Scalable Training
        location: Cupertino, CA, USA
        start_date: 2026-05
        end_date: 2026-08
        highlights:
          - Enabled diffusion and flow-matching model training on AWS Trainium hardware by onboarding SOTA models (Stable Diffusion, FLUX, DiT, Wan) onto Neuron, Annapurna's native PyTorch backend.
          - Implemented and optimized PyTorch ATen operators for the Neuron backend, extending native operator coverage and efficiency.
          - Validated long-horizon training dynamics between Neuron and CUDA across text-to-image, text-to-video, and diffusion language models, ensuring convergence, numerical stability, and quality parity.

      - company: Inria Startup Studio — Centre at Université Côte d'Azur
        position: AI Entrepreneur and Researcher
        location: Valbonne, France
        start_date: 2023-10
        end_date: 2024-09
        highlights:
          - Architected a generative AI pipeline using diffusion transformers and cross-modal alignment to synthesize audio-driven video avatars with high temporal coherence and realistic lip-sync, optimized for real-time generation.
          - Led a 5-member team to launch MVPs for video generation (Product Hunt) and automated presentation creation with avatars.
          - Formulated go-to-market strategy via business plans and financial models; showcased MVPs at VivaTech (Paris) and Bits & Pretzels (Munich), generating 20+ partner and investor leads.

      - company: SwitchOn
        position: Computer Vision Engineer
        location: Bangalore, India
        start_date: 2023-06
        end_date: 2023-09
        highlights:
          - Engineered real-time one-shot anomaly detection pipelines using embedding similarity in memory-bank architectures; led integration of a transformer-based OCR module into the anomaly detection stack.
          - Achieved >99% accuracy with <1% false positives in defect identification on manufacturing lines.
          - Performed remote rollout and on-device validation of models on Linux embedded hardware for robust edge inference.

    Skills:
      - highlights:
          - "**AI & ML Frameworks:** PyTorch, CUDA, JAX, TensorFlow, Keras, HuggingFace (Transformers, Diffusers, PEFT), Weights & Biases"
          - "**Generative AI:** Diffusion Models (DDPM, DDIM, Flow Matching, CFG), Stable Diffusion, FLUX, DiT, Wan2.1, LLMs (fine-tuning, LoRA, RLHF, RAG), GANs"
          - "**Computer Vision:** CLIP, ViT, DINO, Object Detection, Semantic Segmentation, Image Enhancement, OpenCV"
          - "**ML Systems & Infra:** AWS Trainium, Neuron SDK, PyTorch ATen, Distributed Training (DDP, FSDP, ZeRO), Mixed Precision (BF16/FP8), HPCs"
          - "**Languages & Tools:** Python, C/C++, CUDA, Bash, SQL, Git, Docker, Linux, Conda, Jupyter"
